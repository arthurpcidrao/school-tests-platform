version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eduksim_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduksim_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      - db
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

volumes:
  postgres_data:
